name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # Best for both Android/iOS, or ubuntu-latest for just Android
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Setup Java SDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Capacitor Add Android
      run: |
        npx cap init LawyerApp com.muhammad.lawyerapp --web-dir dist
        npx cap add android
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lawyer-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
