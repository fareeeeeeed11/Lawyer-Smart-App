name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually run the build from the GitHub Actions UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # LTS version
          cache: 'npm'

      # 3. Install NPM dependencies
      - name: Install Dependencies
        run: npm ci || npm install # fallback to install if package-lock is out of sync

      # 4. Build Vite web assets
      - name: Build Web Assets
        run: npm run build

      # 5. Sync web code into the native Android Capacitor project
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 6. Setup Java (Required for Android build)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 7. Setup permissions for gradlew script
      - name: Make gradlew Executable
        run: chmod +x android/gradlew

      # 8. Build the APK using Gradle
      - name: Build Android APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      # 9. Upload the generated APK so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
